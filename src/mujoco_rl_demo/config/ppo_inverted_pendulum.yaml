  ros__parameters:
    env_id: "InvertedPendulum-v5"
    model_path: "/home/jack/Desktop/jack_ws/RL_demo/install/mujoco_rl_demo/share/mujoco_rl_demo/models/ppo_inverted_pendulum.zip"
    episodes: 3
    render_mode: "human"